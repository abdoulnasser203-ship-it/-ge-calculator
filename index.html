<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Age Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="section">

    
    <div class="sous-section">
      <div class="item">
        <label for="day" class="label" id="label-day">DAY</label>
        <input type="number" id="day" class="input" placeholder="DD" min="1" max="31" />
        <span class="error-msg" id="error-day"></span>
      </div>

      <div class="item">
        <label for="month" class="label" id="label-month">MONTH</label>
        <input type="number" id="month" class="input" placeholder="MM" min="1" max="12" />
        <span class="error-msg" id="error-month"></span>
      </div>

      <div class="item">
        <label for="year" class="label" id="label-year">YEAR</label>
        <input type="number" id="year" class="input" placeholder="YYYY" min="1900" />
        <span class="error-msg" id="error-year"></span>
      </div>
    </div>

    
    <div class="transition">
      <hr class="ligne" />
      <button class="btn-calculate" id="btn-calculate" onclick="calculerAge()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" width="28" height="28">
          <path d="M12 16.5l-6-6 1.4-1.4 4.6 4.6 4.6-4.6L18 10.5z"/>
        </svg>
      </button>
    </div>

    
    <div class="sous-section_1">
      <div class="resulta">
        <span class="number purple" id="result-years">--</span>
        <span class="word">years</span>
      </div>
      <div class="resulta">
        <span class="number purple" id="result-months">--</span>
        <span class="word">months</span>
      </div>
      <div class="resulta">
        <span class="number purple" id="result-days">--</span>
        <span class="word">days</span>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
